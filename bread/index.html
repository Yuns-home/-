<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>빵빵한 하루</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>빵빵한 하루</h1>
  <p>오늘은 어떤 빵을 만들고 싶으세요?</p>
</header>

<div class="wrap">

  <div class="section-title">지금 상황에 맞는 빵 찾기</div>
  <div class="situation-grid" id="situationGrid"></div>

  <div id="recommendArea"></div>

  <div class="add-recipe-toggle">
    <button class="btn" id="openAddForm">+ 내 레시피 올리기</button>
  </div>

  <div class="form-box" id="addForm">
    <label>빵 이름</label>
    <input type="text" id="r-title" placeholder="예: 곁들임 단호박 식빵">
    <label>한 줄 소개</label>
    <input type="text" id="r-desc" placeholder="이 빵은 이럴 때 먹으면 좋아요">
    <label>빵 사진</label>
    <div class="file-row">
      <input type="file" id="r-image" accept="image/*">
      <img id="r-image-preview">
    </div>
    <label>어울리는 상황 (여러 개 선택 가능)</label>
    <div class="tag-pick-grid" id="r-tags"></div>
    <label>재료 (줄바꿈으로 구분)</label>
    <textarea id="r-ingredients" placeholder="강력분 300g&#10;물 200ml&#10;소금 5g"></textarea>
    <label>만드는 법 (줄바꿈으로 구분)</label>
    <textarea id="r-steps" placeholder="1. 재료를 모두 섞는다&#10;2. 1차 발효한다"></textarea>
    <label>작성자 닉네임</label>
    <input type="text" id="r-author" placeholder="닉네임을 입력하세요">
    <div style="margin-top:16px;text-align:right;">
      <button class="btn secondary" id="cancelAddForm" style="margin-right:8px;">취소</button>
      <button class="btn" id="submitRecipe">레시피 올리기</button>
    </div>
  </div>

</div>

<footer>빵빵한 하루 · 모두가 함께 만드는 레시피 모음</footer>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalContent"></div>
</div>

function loadRecipes(){
  return window.storage.get('recipes', true)
    .then(r=>JSON.parse(r.value))
    .catch(()=>null);
}

async function ensureSeed(){
  let existing = null;
  try{
    const r = await window.storage.get('recipes', true);
    existing = JSON.parse(r.value);
  }catch(e){
    existing = null;
  }

  if(!existing){
    await window.storage.set('recipes', JSON.stringify(SEED_RECIPES), true);
    return;
  }

  let changed = false;
  const seedMap = {};
  SEED_RECIPES.forEach(s=>seedMap[s.id]=s);

  existing.forEach(r=>{
    const seed = seedMap[r.id];
    if(seed && r.image !== seed.image){
      r.image = seed.image;
      changed = true;
    }
  });

  const existingIds = new Set(existing.map(r=>r.id));
  SEED_RECIPES.forEach(s=>{
    if(!existingIds.has(s.id)){
      existing.push(s);
      changed = true;
    }
  });

  if(changed){
    await window.storage.set('recipes', JSON.stringify(existing), true);
  }
}

async function getRecipes(){
  try{
    const r = await window.storage.get('recipes', true);
    return JSON.parse(r.value);
  }catch(e){
    return SEED_RECIPES;
  }
}

async function saveRecipes(list){
  await window.storage.set('recipes', JSON.stringify(list), true);
}

async function getComments(recipeId){
  try{
    const r = await window.storage.get('comments:'+recipeId, true);
    return JSON.parse(r.value);
  }catch(e){
    return [];
  }
}

async function saveComments(recipeId, list){
  await window.storage.set('comments:'+recipeId, JSON.stringify(list), true);
}

let allRecipesCache = [];
let activeSituation = null;
let selectedFormTags = [];

function renderSituationGrid(){
  const grid = document.getElementById('situationGrid');
  grid.innerHTML = '';
  SITUATIONS.forEach(s=>{
    const btn = document.createElement('div');
    btn.className = 'sit-btn' + (activeSituation===s.key ? ' active' : '');
    btn.innerHTML = `<span class="sit-emoji">${s.emoji}</span>${s.label}`;
    btn.onclick = ()=>{
      activeSituation = activeSituation===s.key ? null : s.key;
      renderSituationGrid();
      renderRecommend();
    };
    grid.appendChild(btn);
  });
}

function renderRecommend(){
  const area = document.getElementById('recommendArea');
  if(!activeSituation){
    area.innerHTML = '';
    return;
  }
  const matched = allRecipesCache.filter(r=>r.tags.includes(activeSituation));
  const picked = matched.sort((a,b)=>b.createdAt-a.createdAt).slice(0,3);
  const label = TAG_LABEL[activeSituation];
  let html = `<div class="section-title">'${label}'에 어울리는 빵 ${picked.length}가지</div>`;
  if(picked.length===0){
    html += `<div class="empty-hint">아직 이 상황에 맞는 레시피가 없어요. 첫 레시피를 올려보세요!</div>`;
  }else{
    picked.forEach(r=>{
      html += recipeCardHtml(r);
    });
  }
  area.innerHTML = html;
  attachCardClicks(area);
}

function recipeCardHtml(r){
  const tags = r.tags.map(t=>`<span class="tag">${TAG_LABEL[t]||t}</span>`).join('');
  const thumb = r.image ? `<img class="thumb" src="${r.image}">` : `<div class="thumb"></div>`;
  return `<div class="recipe-card" data-id="${r.id}">
    ${thumb}
    <div class="card-body">
      <h3>${escapeHtml(r.title)}</h3>
      <div class="meta">by ${escapeHtml(r.author||'익명')}</div>
      <div class="recipe-desc">${escapeHtml(r.desc||'')}</div>
      <div style="margin-top:8px;">${tags}</div>
    </div>
  </div>`;
}

function escapeHtml(str){
  const d = document.createElement('div');
  d.innerText = str || '';
  return d.innerHTML;
}

function attachCardClicks(container){
  container.querySelectorAll('.recipe-card').forEach(card=>{
    card.onclick = ()=>openModal(card.getAttribute('data-id'));
  });
}

function renderAllRecipes(){
  // 전체 목록은 더 이상 화면에 표시하지 않음
}

function renderFormTags(){
  const grid = document.getElementById('r-tags');
  grid.innerHTML = '';
  SITUATIONS.forEach(s=>{
    const pill = document.createElement('div');
    pill.className = 'tag-pick' + (selectedFormTags.includes(s.key) ? ' selected' : '');
    pill.innerText = s.emoji + ' ' + s.label;
    pill.onclick = ()=>{
      if(selectedFormTags.includes(s.key)){
        selectedFormTags = selectedFormTags.filter(t=>t!==s.key);
      }else{
        selectedFormTags.push(s.key);
      }
      renderFormTags();
    };
    grid.appendChild(pill);
  });
}

document.getElementById('openAddForm').onclick = ()=>{
  document.getElementById('addForm').classList.add('show');
  document.getElementById('openAddForm').style.display='none';
};
document.getElementById('cancelAddForm').onclick = ()=>{
  document.getElementById('addForm').classList.remove('show');
  document.getElementById('openAddForm').style.display='inline-block';
};

let pendingRecipeImage = null;
document.getElementById('r-image').onchange = (e)=>{
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ()=>{
    pendingRecipeImage = reader.result;
    const prev = document.getElementById('r-image-preview');
    prev.src = pendingRecipeImage;
    prev.style.display = 'block';
  };
  reader.readAsDataURL(file);
};

document.getElementById('submitRecipe').onclick = async ()=>{
  const title = document.getElementById('r-title').value.trim();
  const desc = document.getElementById('r-desc').value.trim();
  const ingredientsRaw = document.getElementById('r-ingredients').value.trim();
  const stepsRaw = document.getElementById('r-steps').value.trim();
  const author = document.getElementById('r-author').value.trim() || '익명';

  if(!title || selectedFormTags.length===0 || !ingredientsRaw || !stepsRaw){
    alert('빵 이름, 재료, 만드는 법, 상황 태그는 꼭 입력해주세요.');
    return;
  }

  const newRecipe = {
    id: 'r-' + Date.now(),
    title, desc,
    image: pendingRecipeImage,
    tags: [...selectedFormTags],
    ingredients: ingredientsRaw.split('\n').filter(Boolean),
    steps: stepsRaw.split('\n').filter(Boolean),
    author,
    createdAt: Date.now()
  };

  allRecipesCache.push(newRecipe);
  await saveRecipes(allRecipesCache);

  document.getElementById('r-title').value='';
  document.getElementById('r-desc').value='';
  document.getElementById('r-ingredients').value='';
  document.getElementById('r-steps').value='';
  document.getElementById('r-author').value='';
  document.getElementById('r-image').value='';
  document.getElementById('r-image-preview').style.display='none';
  pendingRecipeImage = null;
  selectedFormTags = [];
  renderFormTags();
  document.getElementById('addForm').classList.remove('show');
  document.getElementById('openAddForm').style.display='inline-block';

  renderAllRecipes();
  if(activeSituation) renderRecommend();
};

async function openModal(id){
  const recipe = allRecipesCache.find(r=>r.id===id);
  if(!recipe) return;
  const overlay = document.getElementById('modalOverlay');
  const content = document.getElementById('modalContent');

  const tags = recipe.tags.map(t=>`<span class="tag">${TAG_LABEL[t]||t}</span>`).join('');
  const ingredientsHtml = recipe.ingredients.map(i=>`<li>${escapeHtml(i)}</li>`).join('');
  const stepsHtml = recipe.steps.map(s=>`<li>${escapeHtml(s)}</li>`).join('');

  content.innerHTML = `
    <button class="modal-close" id="modalCloseBtn">✕</button>
    ${recipe.image ? `<img src="${recipe.image}" style="width:100%;max-height:260px;object-fit:cover;border-radius:14px;margin-bottom:16px;">` : ''}
    <h2>${escapeHtml(recipe.title)}</h2>
    <div style="color:var(--muted);font-size:13px;margin-bottom:6px;">by ${escapeHtml(recipe.author||'익명')}</div>
    <div style="margin-bottom:10px;">${tags}</div>
    <div style="margin-bottom:18px;font-size:14px;">${escapeHtml(recipe.desc||'')}</div>
    <div style="font-weight:700;margin-bottom:6px;">재료</div>
    <ul class="ingredient-list">${ingredientsHtml}</ul>
    <div style="font-weight:700;margin:16px 0 6px;">만드는 법</div>
    <ol class="step-list">${stepsHtml}</ol>
    <div class="comment-section">
      <div style="font-weight:700;margin-bottom:10px;">댓글</div>
      <div id="commentsList">불러오는 중...</div>
      <div class="comment-form">
        <textarea id="commentText" placeholder="이 레시피에 대한 후기를 남겨주세요" style="border:1px solid var(--wheat);border-radius:8px;padding:8px;font-size:14px;min-height:50px;"></textarea>
        <div class="file-row">
          <input type="file" id="commentImage" accept="image/*">
          <img id="commentPreview">
        </div>
        <div style="display:flex;gap:8px;">
          <input type="text" id="commentAuthor" placeholder="닉네임" style="flex:1;border:1px solid var(--wheat);border-radius:8px;padding:8px;font-size:14px;">
          <button class="btn" id="submitComment">댓글 남기기</button>
        </div>
      </div>
    </div>
  `;
  overlay.classList.add('show');

  document.getElementById('modalCloseBtn').onclick = ()=>overlay.classList.remove('show');
  overlay.onclick = (e)=>{ if(e.target===overlay) overlay.classList.remove('show'); };

  let pendingImageData = null;
  document.getElementById('commentImage').onchange = (e)=>{
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = ()=>{
      pendingImageData = reader.result;
      const prev = document.getElementById('commentPreview');
      prev.src = pendingImageData;
      prev.style.display = 'block';
    };
    reader.readAsDataURL(file);
  };

  const comments = await getComments(recipe.id);
  renderComments(comments);

  document.getElementById('submitComment').onclick = async ()=>{
    const text = document.getElementById('commentText').value.trim();
    const author = document.getElementById('commentAuthor').value.trim() || '익명';
    if(!text && !pendingImageData){
      alert('댓글 내용이나 사진을 추가해주세요.');
      return;
    }
    const updated = await getComments(recipe.id);
    updated.push({
      id:'c-'+Date.now(),
      text, author,
      image: pendingImageData,
      createdAt: Date.now()
    });
    await saveComments(recipe.id, updated);
    renderComments(updated);
    document.getElementById('commentText').value='';
    document.getElementById('commentAuthor').value='';
    document.getElementById('commentImage').value='';
    document.getElementById('commentPreview').style.display='none';
    pendingImageData = null;
  };

  function renderComments(list){
    const el = document.getElementById('commentsList');
    if(!list || list.length===0){
      el.innerHTML = '<div class="empty-hint">아직 댓글이 없어요. 첫 후기를 남겨보세요!</div>';
      return;
    }
    el.innerHTML = list.sort((a,b)=>b.createdAt-a.createdAt).map(c=>`
      <div class="comment">
        <div class="c-meta">${escapeHtml(c.author)}</div>
        <div>${escapeHtml(c.text)}</div>
        ${c.image ? `<img src="${c.image}">` : ''}
      </div>
    `).join('');
  }
}

async function init(){
  await ensureSeed();
  allRecipesCache = await getRecipes();
  renderSituationGrid();
  renderFormTags();
  renderAllRecipes();
}
init();
</script>
